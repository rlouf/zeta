repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check
        language: system
        require_serial: true
        types_or: [python, pyi]
        exclude: ^docs/demos/
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --check
        language: system
        require_serial: true
        types_or: [python, pyi]
        exclude: ^docs/demos/
      - id: ty-check
        name: ty check
        entry: uv run ty check src tests
        language: system
        require_serial: true
        pass_filenames: false
      - id: vulture
        name: vulture
        entry: uv run vulture
        language: system
        require_serial: true
        pass_filenames: false
      - id: complexipy
        name: complexipy
        entry: uv run complexipy src tests --plain --failed --max-complexity-allowed 25
        language: system
        require_serial: true
        pass_filenames: false
